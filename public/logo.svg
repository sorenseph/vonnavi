<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" fill="none">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a853"/>
      <stop offset="50%" style="stop-color:#f4e4bc"/>
      <stop offset="100%" style="stop-color:#d4a853"/>
    </linearGradient>
    <linearGradient id="sunrise" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e85d04"/>
      <stop offset="100%" style="stop-color:#f4a261"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Hot air balloon icon -->
  <g transform="translate(10, 8)">
    <ellipse cx="35" cy="25" rx="28" ry="22" fill="url(#gold)" opacity="0.95"/>
    <path d="M20 45 L35 52 L50 45 L48 48 L35 55 L22 48 Z" fill="url(#gold)" opacity="0.9"/>
    <rect x="33" y="55" width="4" height="12" fill="url(#gold)"/>
    <rect x="30" y="67" width="10" height="4" rx="1" fill="url(#gold)"/>
  </g>
  <!-- Von Navi text -->
  <text x="95" y="38" font-family="Georgia, serif" font-size="28" font-weight="700" fill="url(#gold)" filter="url(#glow)">Von Navi</text>
  <text x="95" y="58" font-family="system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.7)" letter-spacing="2">VUELO EN GLOBO</text>
</svg>
